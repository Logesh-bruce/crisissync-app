# =============================================
# Application
# =============================================
spring.application.name=crisissync-backend
server.port=8080

# =============================================
# Database (MySQL)
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/crisissync_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT
# =============================================
# IMPORTANT: Replace with your own Base64-encoded 256-bit secret
# Generate one via: openssl rand -base64 32
app.jwt.secret=dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LTI1NmJpdHM=
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# =============================================
# JavaMail (SMTP)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================
# Logging
# =============================================
logging.level.com.crisissync=DEBUG
logging.level.org.springframework.security=DEBUG
